<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ngủ ngon nha ♡</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #04040f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── Sky canvas ── */
    #sky {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Moon ── */
    .moon {
      position: fixed;
      top: 7vh;
      right: 13vw;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #fffbe8, #fde68a 55%, #f59e0b88);
      box-shadow:
        0 0 28px 10px rgba(253,230,138,0.25),
        0 0 70px 30px rgba(253,230,138,0.10),
        0 0 140px 60px rgba(253,230,138,0.05);
      animation: moonGlow 6s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes moonGlow {
      0%,100% { box-shadow: 0 0 28px 10px rgba(253,230,138,.28), 0 0 70px 30px rgba(253,230,138,.10); }
      50%      { box-shadow: 0 0 44px 18px rgba(253,230,138,.38), 0 0 100px 50px rgba(253,230,138,.15); }
    }
    /* crater detail */
    .moon::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      top: 20px; left: 28px;
      background: rgba(0,0,0,0.06);
      border-radius: 50%;
      box-shadow: 22px 22px 0 10px rgba(0,0,0,0.04), -10px 30px 0 6px rgba(0,0,0,0.03);
    }

    /* ── Shooting stars (CSS) ── */
    .shoot {
      position: fixed;
      top: 0; left: 0;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: shoot linear infinite;
    }
    @keyframes shoot {
      0%   { opacity: 0; transform: translate(0,0) rotate(215deg) scaleX(1); }
      5%   { opacity: 1; }
      60%  { opacity: 0.6; transform: translate(60vw, 60vh) rotate(215deg) scaleX(60); }
      100% { opacity: 0; transform: translate(80vw, 80vh) rotate(215deg) scaleX(80); }
    }

    /* ── Floating Zzz ── */
    .zzz {
      position: fixed;
      color: rgba(167,139,250,0.55);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      pointer-events: none;
      animation: floatZzz linear infinite;
      opacity: 0;
      z-index: 2;
    }
    @keyframes floatZzz {
      0%   { opacity: 0; transform: translate(0,0) scale(0.7); }
      15%  { opacity: 0.65; }
      85%  { opacity: 0.4; }
      100% { opacity: 0; transform: translate(30px,-110px) scale(1.3); }
    }

    /* ── Soft cloud wisps ── */
    .wisp {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(139,92,246,0.08), transparent 70%);
      animation: driftWisp linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes driftWisp {
      from { transform: translateX(-10vw); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      to   { transform: translateX(110vw); opacity: 0; }
    }

    /* ── Main content ── */
    .center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0 24px;
      text-align: center;
    }

    /* moon icon above text */
    .moon-icon {
      font-size: 2.6rem;
      margin-bottom: 28px;
      animation: moonIconPulse 4s ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(253,230,138,0.6));
    }
    @keyframes moonIconPulse {
      0%,100% { transform: translateY(0) rotate(-8deg); filter: drop-shadow(0 0 14px rgba(253,230,138,.6)); }
      50%      { transform: translateY(-8px) rotate(4deg); filter: drop-shadow(0 0 24px rgba(253,230,138,.9)); }
    }

    /* quote */
    .quote {
      font-size: clamp(1.35rem, 3.5vw, 2.1rem);
      font-weight: 400;
      font-style: italic;
      color: rgba(226,218,255,0.82);
      line-height: 1.9;
      letter-spacing: 0.5px;
      max-width: 600px;
      text-shadow: 0 0 40px rgba(139,92,246,0.3);
      overflow: hidden;
    }

    /* typewriter wrapper */
    .typewriter-line {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid transparent;
      width: 0;
    }
    .typewriter-line.typing {
      animation: expand var(--dur, 2.8s) steps(var(--steps, 40), end) forwards,
                 blink 0.75s step-end var(--dur, 2.8s) 4;
    }
    @keyframes expand { to { width: 100%; } }
    @keyframes blink  { 0%,100%{border-color:transparent} 50%{border-color:rgba(167,139,250,0.7)} }

    /* separator */
    .sep {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.5), transparent);
      margin: 28px auto;
      opacity: 0;
      transition: width 1.6s ease 0.3s, opacity 1s ease 0.3s;
    }
    .sep.show { width: 220px; opacity: 1; }

    /* love you */
    .love {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      background: linear-gradient(135deg, #f9a8d4, #c084fc, #f9a8d4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite, lovePulse 3s ease-in-out infinite;
      opacity: 0;
      filter: drop-shadow(0 0 20px rgba(240,114,182,0.4));
      letter-spacing: 2px;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    @keyframes lovePulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    .love.show { opacity: 1; transition: opacity 1.6s ease; }

    /* heart row */
    .hearts {
      margin-top: 20px;
      font-size: 1.1rem;
      letter-spacing: 10px;
      opacity: 0;
      transition: opacity 1.6s ease 0.4s;
      color: rgba(249,168,212,0.6);
    }
    .hearts.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="sky"></canvas>
<div class="moon"></div>

<!-- content -->
<div class="center">
  <div class="moon-icon">🌙</div>

  <div class="quote">
    <span class="typewriter-line" id="line1"
      style="--dur:2.6s;--steps:44">Hãy nhắm mắt cho ngày dài khép lại,</span>
    <span class="typewriter-line" id="line2"
      style="--dur:2.8s;--steps:48">đêm khuya rồi chúc ai đó ngủ ngon</span>
  </div>

  <div class="sep" id="sep"></div>

  <div class="love" id="love">Love you ♡</div>
  <div class="hearts" id="hearts">♡ &nbsp; ♡ &nbsp; ♡</div>
</div>

<script>
/* ── Stars canvas ── */
const sky = document.getElementById('sky');
const ctx = sky.getContext('2d');
let W, H, stars = [];

function resize() {
  W = sky.width  = window.innerWidth;
  H = sky.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); buildStars(); });
resize();

function buildStars() {
  stars = Array.from({ length: 200 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H * 0.78,
    r: Math.random() * 1.2 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: 0.003 + Math.random() * 0.006,
    hue: Math.random() < 0.15 ? 260 : 0,
  }));
}
buildStars();

(function drawStars(t) {
  ctx.clearRect(0, 0, W, H);
  for (const s of stars) {
    const a = 0.25 + 0.75 * Math.abs(Math.sin(s.phase + t * s.speed));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.hue
      ? `hsla(${s.hue},80%,80%,${a})`
      : `rgba(255,252,245,${a})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
})();

/* ── Shooting stars ── */
function addShoot() {
  const el = document.createElement('div');
  el.className = 'shoot';
  const startX = Math.random() * 60 + 10;
  const startY = Math.random() * 30;
  el.style.left = startX + 'vw';
  el.style.top  = startY + 'vh';
  const dur = 2.5 + Math.random() * 3;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = Math.random() * 2 + 's';
  el.style.width  = (1 + Math.random()) + 'px';
  el.style.background = `rgba(255,252,245,0.9)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 3) * 1000);
}
setInterval(addShoot, 4500);
addShoot();

/* ── Floating Zzz ── */
const zChars = ['z','z','Z','zzz','Zzz'];
function addZzz() {
  const el = document.createElement('div');
  el.className = 'zzz';
  el.textContent = zChars[Math.floor(Math.random() * zChars.length)];
  el.style.left   = (15 + Math.random() * 70) + 'vw';
  el.style.bottom = (10 + Math.random() * 25) + 'vh';
  const dur = 5 + Math.random() * 5;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = Math.random() * 3 + 's';
  el.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}
setInterval(addZzz, 1800);
for (let i = 0; i < 4; i++) addZzz();

/* ── Cloud wisps ── */
function addWisp() {
  const el = document.createElement('div');
  el.className = 'wisp';
  const size = 200 + Math.random() * 300;
  el.style.width  = size + 'px';
  el.style.height = size * 0.4 + 'px';
  el.style.top  = (20 + Math.random() * 60) + 'vh';
  el.style.left = '-20vw';
  const dur = 30 + Math.random() * 30;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = Math.random() * 10 + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 12) * 1000);
}
setInterval(addWisp, 8000);
addWisp();

/* ── Typewriter sequence ── */
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');
const sep   = document.getElementById('sep');
const love  = document.getElementById('love');
const hearts= document.getElementById('hearts');

// line1 starts immediately
line1.classList.add('typing');

// line2 starts after line1 finishes (~2.7s)
setTimeout(() => line2.classList.add('typing'), 2800);

// separator after both lines
setTimeout(() => sep.classList.add('show'), 6200);

// "Love you" fades in
setTimeout(() => love.classList.add('show'), 7400);

// tiny hearts
setTimeout(() => hearts.classList.add('show'), 8200);
</script>
</body>
</html>
