<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ngủ ngon nha ♡</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0f1f5c 0%, #1b1050 35%, #2a0e4f 65%, #150d3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── Sky canvas ── */
    #sky {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Ambient glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.18;
    }
    .blob-1 { width: 500px; height: 500px; background: #4f46e5; top: -120px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; right: -80px; }
    .blob-3 { width: 300px; height: 300px; background: #2563eb; top: 30%; left: 40%; }

    /* ── Moon ── */
    .moon {
      position: fixed;
      top: 7vh;
      right: 13vw;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: radial-gradient(circle at 36% 36%, #fff9e6, #fde68a 50%, #fbbf24cc);
      box-shadow:
        0 0 0 6px rgba(253,230,138,0.08),
        0 0 40px 16px rgba(253,230,138,0.35),
        0 0 90px 40px rgba(253,230,138,0.18),
        0 0 180px 80px rgba(253,230,138,0.07);
      animation: moonGlow 6s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes moonGlow {
      0%,100% { box-shadow: 0 0 40px 16px rgba(253,230,138,.35), 0 0 90px 40px rgba(253,230,138,.18); }
      50%      { box-shadow: 0 0 60px 24px rgba(253,230,138,.5),  0 0 130px 60px rgba(253,230,138,.25); }
    }
    .moon::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      top: 22px; left: 26px;
      background: rgba(0,0,0,0.07);
      border-radius: 50%;
      box-shadow: 20px 20px 0 10px rgba(0,0,0,0.05), -8px 30px 0 5px rgba(0,0,0,0.04);
    }

    /* ── Shooting stars ── */
    .shoot {
      position: fixed;
      top: 0; left: 0;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: shoot linear infinite;
    }
    @keyframes shoot {
      0%   { opacity: 0; transform: translate(0,0) rotate(215deg) scaleX(1); }
      5%   { opacity: 1; }
      60%  { opacity: 0.7; transform: translate(55vw,55vh) rotate(215deg) scaleX(55); }
      100% { opacity: 0; transform: translate(75vw,75vh) rotate(215deg) scaleX(75); }
    }

    /* ── Floating Zzz ── */
    .zzz {
      position: fixed;
      color: rgba(196,181,253,0.65);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      pointer-events: none;
      animation: floatZzz linear infinite;
      opacity: 0;
      z-index: 2;
    }
    @keyframes floatZzz {
      0%   { opacity: 0; transform: translate(0,0) scale(0.7); }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.4; }
      100% { opacity: 0; transform: translate(28px,-100px) scale(1.3); }
    }

    /* ── Drifting wisps ── */
    .wisp {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(99,102,241,0.12), transparent 70%);
      animation: driftWisp linear infinite;
      pointer-events: none;
      z-index: 1;
      filter: blur(2px);
    }
    @keyframes driftWisp {
      from { transform: translateX(-15vw); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.7; }
      to   { transform: translateX(115vw); opacity: 0; }
    }

    /* ── Card ── */
    .center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 28px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 32px;
      padding: 52px 48px;
      max-width: 580px;
      width: 92%;
      box-shadow: 0 8px 48px rgba(79,70,229,0.2), 0 2px 12px rgba(0,0,0,0.3);
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(50px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* moon icon */
    .moon-icon {
      font-size: 2.8rem;
      margin-bottom: 26px;
      animation: moonIconPulse 4s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(253,230,138,0.7));
    }
    @keyframes moonIconPulse {
      0%,100% { transform: translateY(0) rotate(-8deg); filter: drop-shadow(0 0 18px rgba(253,230,138,.7)); }
      50%      { transform: translateY(-9px) rotate(5deg); filter: drop-shadow(0 0 30px rgba(253,230,138,1)); }
    }

    /* quote */
    .quote {
      font-size: clamp(1.3rem, 3.2vw, 2rem);
      font-weight: 400;
      font-style: italic;
      color: rgba(237,233,255,0.92);
      line-height: 2;
      letter-spacing: 0.4px;
      max-width: 520px;
      text-shadow: 0 2px 24px rgba(139,92,246,0.45);
    }

    .typewriter-line {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid transparent;
      width: 0;
    }
    .typewriter-line.typing {
      animation: expand var(--dur, 2.8s) steps(var(--steps, 40), end) forwards,
                 blink 0.75s step-end var(--dur, 2.8s) 4;
    }
    @keyframes expand { to { width: 100%; } }
    @keyframes blink  {
      0%,100% { border-color: transparent; }
      50%     { border-color: rgba(196,181,253,0.8); }
    }

    /* separator */
    .sep {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,181,253,0.6), transparent);
      margin: 30px auto;
      opacity: 0;
      transition: width 1.8s ease 0.2s, opacity 1s ease 0.2s;
    }
    .sep.show { width: 240px; opacity: 1; }

    /* Love you */
    .love {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.6rem, 6vw, 4rem);
      background: linear-gradient(135deg, #fda4af, #c084fc, #818cf8, #fda4af);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 5s linear infinite, lovePulse 3.5s ease-in-out infinite;
      opacity: 0;
      filter: drop-shadow(0 0 24px rgba(240,114,182,0.5));
      letter-spacing: 2px;
    }
    @keyframes shimmer  { to { background-position: 300% center; } }
    @keyframes lovePulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }
    .love.show { opacity: 1; transition: opacity 1.8s ease; }

    /* hearts */
    .hearts {
      margin-top: 18px;
      font-size: 1.1rem;
      letter-spacing: 12px;
      opacity: 0;
      transition: opacity 1.8s ease 0.3s;
      color: rgba(253,164,175,0.7);
    }
    .hearts.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ambient blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<canvas id="sky"></canvas>
<div class="moon"></div>

<div class="center">
  <div class="moon-icon">🌙</div>

  <div class="quote">
    <span class="typewriter-line" id="line1"
      style="--dur:2.6s;--steps:44">Hãy nhắm mắt cho ngày dài khép lại,</span>
    <span class="typewriter-line" id="line2"
      style="--dur:2.8s;--steps:43">đêm khuya rồi chúc ai đó ngủ ngon</span>
  </div>

  <div class="sep" id="sep"></div>
  <div class="love" id="love">Love you ♡</div>
  <div class="hearts" id="hearts">♡ &nbsp; ♡ &nbsp; ♡</div>
</div>

<script>
/* ── Stars ── */
const sky = document.getElementById('sky');
const ctx = sky.getContext('2d');
let W, H, stars = [];

function resize() {
  W = sky.width  = window.innerWidth;
  H = sky.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); buildStars(); });
resize();

function buildStars() {
  stars = Array.from({ length: 220 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H * 0.85,
    r: Math.random() * 1.5 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: 0.003 + Math.random() * 0.007,
    color: Math.random() < 0.2
      ? `hsl(${240 + Math.random()*60},80%,82%)`
      : `hsl(0,0%,${88 + Math.random()*12}%)`,
  }));
}
buildStars();

(function drawStars(t) {
  ctx.clearRect(0, 0, W, H);
  for (const s of stars) {
    const a = 0.35 + 0.65 * Math.abs(Math.sin(s.phase + t * s.speed));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color.replace(')', `,${a})`).replace('hsl(', 'hsla(').replace('rgb(','rgba(');
    // simpler:
    ctx.globalAlpha = a;
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(drawStars);
})();

/* ── Shooting stars ── */
function addShoot() {
  const el = document.createElement('div');
  el.className = 'shoot';
  el.style.left = (5 + Math.random() * 55) + 'vw';
  el.style.top  = (Math.random() * 35) + 'vh';
  const dur = 2.2 + Math.random() * 3;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = Math.random() * 2 + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 3) * 1000);
}
setInterval(addShoot, 4000);
addShoot();

/* ── Zzz ── */
const zChars = ['z','z','Z','zzz','Zzz'];
function addZzz() {
  const el = document.createElement('div');
  el.className = 'zzz';
  el.textContent = zChars[Math.floor(Math.random() * zChars.length)];
  el.style.left   = (12 + Math.random() * 76) + 'vw';
  el.style.bottom = (8 + Math.random() * 28) + 'vh';
  const dur = 5 + Math.random() * 5;
  el.style.animationDuration = dur + 's';
  el.style.fontSize = (0.9 + Math.random() * 1.1) + 'rem';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}
setInterval(addZzz, 1600);
for (let i = 0; i < 4; i++) addZzz();

/* ── Wisps ── */
function addWisp() {
  const el = document.createElement('div');
  el.className = 'wisp';
  const size = 220 + Math.random() * 280;
  el.style.width  = size + 'px';
  el.style.height = size * 0.38 + 'px';
  el.style.top    = (15 + Math.random() * 65) + 'vh';
  const dur = 28 + Math.random() * 28;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = Math.random() * 8 + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 10) * 1000);
}
setInterval(addWisp, 7000);
addWisp(); addWisp();

/* ── Sequence ── */
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');

line1.classList.add('typing');
setTimeout(() => line2.classList.add('typing'), 2800);
setTimeout(() => document.getElementById('sep').classList.add('show'), 6200);
setTimeout(() => document.getElementById('love').classList.add('show'), 7400);
setTimeout(() => document.getElementById('hearts').classList.add('show'), 8300);
</script>
</body>
</html>
